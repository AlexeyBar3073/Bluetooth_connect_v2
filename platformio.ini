; PlatformIO Project Configuration File
;
; Project: Bluetooth_connect_v2
; Architecture: Packet-based Pub/Sub (9 aggregated packets)
; Firmware: v5.0.0

[env:wemos_d1_mini32]
platform = espressif32
board = wemos_d1_mini32
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps =
	bblanchon/ArduinoJson
	olikraus/U8g2
build_flags =
	-DCONFIG_ARDUHAL_LOG_COLORS=1
	-DCONFIG_FREERTOS_UNICORE=0
	-I src/common
	-I include
	-D REAL_ENGINE_ENABLED=0
